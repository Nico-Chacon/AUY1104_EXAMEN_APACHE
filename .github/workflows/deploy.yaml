name: Client Deploy V3
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      env_vars:
        required: false
        type: string
        default: "LOG_LEVEL=debug APP_ENV=production"
jobs:
  deploy:
    uses: Nico-Chacon/AUY1104_EXAMEN_Primary/.github/workflows/deploy-api.yaml@main
    with:
      image-name: demo-api
      image-tag: ${{ github.ref_name }}
      k3s-server-public-ip: ${{ vars.K3S_SERVER_PUBLIC_IP }}
      environment: production
      namespace: default
      env_vars: ${{ inputs.env_vars }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      EA2_SSH_PRIVATE_KEY: ${{ secrets.EA2_SSH_PRIVATE_KEY }}
      k3s-server-public-ip: ${{ vars.K3S_SERVER_PUBLIC_IP }}