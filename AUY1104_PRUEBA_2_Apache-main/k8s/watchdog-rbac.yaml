# Permisos mínimos para que el watchdog pueda:
#  - leer el estado del Service público (saber qué color está activo)
#  - leer pods (diagnóstico)
#  - modificar (patch) el Service público para hacer el fallback de color
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-api-watchdog-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-api-watchdog-role
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-api-watchdog-binding
subjects:
  - kind: ServiceAccount
    name: demo-api-watchdog-sa
roleRef:
  kind: Role
  name: demo-api-watchdog-role
  apiGroup: rbac.authorization.k8s.io
