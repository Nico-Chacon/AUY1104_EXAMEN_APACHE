apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api-blue
  labels:
    app: demo-api
    version: blue

spec:
  replicas: 1

  selector:
    matchLabels:
      app: demo-api
      version: blue

  template:
    metadata:
      labels:
        app: demo-api
        version: blue

    spec:
      containers:
      - name: demo-api
        image: chaconnico/demo-api:bootstrap
        imagePullPolicy: Always

        ports:
        - containerPort: 3000


        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3


        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
